<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <title>Contact Us</title>

    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/contact.css">
    <link rel="stylesheet" href="styles/responsive.css">
    
    <script src="scripts/api.js" defer></script>
    <script src="scripts/common.js" defer></script>
    <script src="scripts/contact.js" defer></script>

</head>

<body>
    
    <div id="header-placeholder"></div>

    <main class="contact-us">
        <h1 class="custom-title">Contact Us</h1>
    
        <div class="contact-flex">
            <div class="photoWrap">
                <img class="photo" src="images/chef2.png" alt="chef2-img" />
            </div>
    
            <form id="contactForm" class="form">
                <div class="row">
                    <div class="field">
                        <label>Name</label>
                        <input id="name" type="text" placeholder="Enter your name..." />
                    </div>
    
                    <div class="field">
                        <label>Email address</label>
                        <input id="email" type="text" placeholder="Your email address..." />
                    </div>
                </div>
    
                <div class="row">
                    <div class="field">
                        <label>Subject</label>
                        <input id="subject" type="text" placeholder="Enter subject..." />
                    </div>

                    <div class="field">
                        <label>Enquiry type</label>
                        <select id="enquiryType">
                            <option>Advertising</option>
                            <option>General</option>
                            <option>Support</option>              
                        </select>
                    </div>
                </div>
    
                <div class="row one">
                    <div class="field">
                        <label>Messages</label>
                        <textarea id="message" rows="6" placeholder="Enter your messages..."></textarea>
                    </div>
                </div>

                <div class="row one">
                    <div class="field">
                        <input id="contact-btn" class="submit-btn" type="submit" value="SUBMIT">
                    </div>
                </div>
            </form>
        </div>
    </main>

    <div id="sub-placeholder"></div>

    <section class="tryThis" id="maybeLiked">
        <div class="tryThis-header">
            <div class="flex">
                <h1 class="custom-title" id="checkOut">Check out the delicious recipe</h1>
            </div>
    
            <div class="carousel-controls">
                <button type="button" class="carousel-btn prev-btn">‹</button>
                <button type="button" class="carousel-btn next-btn">›</button>
            </div>
        </div>
        <div id="tryThis-placeholder"></div>
    </section>

    <div id="footer-placeholder"></div>

</body>

</html>
