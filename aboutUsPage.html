<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <title>Abous Us</title>

    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/about-us.css">
    <link rel="stylesheet" href="styles/responsive.css">
    
    <script src="scripts/api.js" defer></script>
    <script src="scripts/common.js" defer></script>

</head>

<body>
    
    <div id="header-placeholder"></div>

    <div class="about-us">
        <h1 class="custom-title">About Us</h1>
    </div>

    <section class="instagram">
        <h1 class="custom-title">Check out @foodieland on Instagram</h1>
        <p class="custom-desc">
            Lorem ipsum dolor sit amet, consectetuipisicing elit, sed do eiusmod tempor incididunt ut labore et dolore <br>
            magna aliqut enim ad minim
        </p>
        <div class="flex">
            <img src="images/post-1.png" alt="post-1-img">
            <img src="images/post-2.png" alt="post-2-img">
            <img src="images/post-3.png" alt="post-3-img">
            <img src="images/post-4.png" alt="post-4-img">
        </div>
        <a class="custom-button" id="instagram-button">
            Visit Our Instagram<i class="button-icon" id="instagram-icon"></i></a>
    </section>
    
    <div id="sub-placeholder"></div>

    <section class="tryThis" id="maybeLiked">
        <div class="tryThis-header">
            <div class="flex">
                <h1 class="custom-title" id="checkOut">Check out the delicious recipe</h1>
            </div>
    
            <div class="carousel-controls">
                <button type="button" class="carousel-btn prev-btn">‹</button>
                <button type="button" class="carousel-btn next-btn">›</button>
            </div>
        </div>
        <div id="tryThis-placeholder"></div>
    </section>

    <div id="footer-placeholder"></div>

</body>

</html>
